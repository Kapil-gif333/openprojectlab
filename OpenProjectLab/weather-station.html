<section class="section">
<h3>💻 Code</h3>
<pre>
#include <DHT.h>

DHT dht(D4, DHT11);

void setup(){
Serial.begin(9600);
dht.begin();
}

void loop(){
Serial.println(dht.readTemperature());
delay(2000);
}

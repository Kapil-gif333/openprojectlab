<section class="section">

<section class="section">
<h3>🔌 Connections</h3>

<table>
<tr><th>Servo</th><th>Pin</th></tr>
<tr><td>Base Servo</td><td>D9</td></tr>
<tr><td>Arm Servo</td><td>D10</td></tr>
<tr><td>Gripper Servo</td><td>D11</td></tr>
</table>
</section>

<section class="section">
<h3>💻 Code</h3>

<pre>
#include <Servo.h>

Servo s1;

void setup(){
s1.attach(9);
}

void loop(){
s1.write(0);
delay(1000);
s1.write(90);
delay(1000);
}
</pre>

</section>
